name: CI
on:
  push:
  pull_request:
jobs:
  gates:
    runs-on: ubuntu-latest
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx tsc -b
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e            # root base: builds root dist + full suite
      - run: npm run test:e2e:subpath    # subpath base: builds /enoteweb/ dist + offline/update
        env:
          BASE_PATH: /enoteweb/
