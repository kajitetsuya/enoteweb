<svg xmlns="http://www.w3.org/2000/svg" viewBox="31 31 450 450" role="img" aria-label="Encryption icon">
  <defs>
    <mask id="lock-cutout-v3">
      <rect width="512" height="512" fill="black"/>
      <circle cx="256" cy="256" r="168" fill="white"/>

      <!-- transparent lock body -->
      <path d="M180 218 H332
               Q348 218 348 234
               V336
               Q348 352 332 352
               H180
               Q164 352 164 336
               V234
               Q164 218 180 218 Z"
            fill="black"/>

      <!-- transparent, slightly thinner and shorter shackle -->
      <path d="M214 218
               V186
               C214 156 233 137 256 137
               C279 137 298 156 298 186
               V218"
            fill="none" stroke="black" stroke-width="28"
            stroke-linecap="round" stroke-linejoin="round"/>

      <!-- visible keyhole centered in the lock rectangle -->
      <circle cx="256" cy="271" r="14" fill="white"/>
      <path d="M249 283 H263 L271 315 H241 Z" fill="white"/>
    </mask>
  </defs>

  <g transform="translate(256 256) scale(1.3029) translate(-256 -256)">
    <circle cx="256" cy="256" r="168" fill="#000000" mask="url(#lock-cutout-v3)"/>
  </g>
</svg>
